<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 375" fill="none">
  <!-- Background -->
  <rect width="500" height="375" rx="12" fill="#F8FAFA"/>
  
  <!-- Medical cross icon -->
  <rect x="200" y="120" width="100" height="100" rx="16" fill="#0E7C7B" opacity="0.08"/>
  <rect x="235" y="145" width="30" height="50" rx="4" fill="#0E7C7B"/>
  <rect x="220" y="160" width="60" height="20" rx="4" fill="#0E7C7B"/>
  
  <!-- Doctor figure -->
  <circle cx="250" cy="140" r="30" fill="#0E7C7B" opacity="0.15"/>
  <rect x="235" y="170" width="30" height="45" rx="8" fill="#0E7C7B" opacity="0.12"/>
  
  <!-- Stethoscope -->
  <path d="M250 170 L250 185 M240 190 L260 190" stroke="#0E7C7B" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <circle cx="250" cy="195" r="6" fill="none" stroke="#0E7C7B" stroke-width="2" opacity="0.3"/>
  
  <!-- Heart rate line -->
  <polyline points="120,280 160,280 180,260 200,300 220,250 240,290 260,240 280,280 300,280" stroke="#2DD4BF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.6"/>
  
  <!-- Calendar icon -->
  <rect x="330" y="230" width="40" height="40" rx="6" fill="#0E7C7B" opacity="0.08"/>
  <rect x="334" y="234" width="32" height="6" rx="2" fill="#0E7C7B" opacity="0.2"/>
  <text x="340" y="262" font-family="system-ui" font-size="10" fill="#0E7C7B" opacity="0.3">12</text>
  
  <!-- Plus icon -->
  <circle cx="140" cy="240" r="18" fill="#2DD4BF" opacity="0.1"/>
  <line x1="132" y1="240" x2="148" y2="240" stroke="#2DD4BF" stroke-width="2" opacity="0.4"/>
  <line x1="140" y1="232" x2="140" y2="248" stroke="#2DD4BF" stroke-width="2" opacity="0.4"/>
  
  <!-- Abstract dots pattern -->
  <circle cx="80" cy="80" r="4" fill="#0E7C7B" opacity="0.06"/>
  <circle cx="420" cy="100" r="3" fill="#0E7C7B" opacity="0.06"/>
  <circle cx="380" cy="300" r="5" fill="#2DD4BF" opacity="0.06"/>
  <circle cx="100" cy="320" r="3" fill="#0E7C7B" opacity="0.06"/>
</svg>
